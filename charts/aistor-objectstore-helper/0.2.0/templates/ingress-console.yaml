
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.baseName }}-console
  namespace: {{ .Release.Namespace }}
  annotations:
    # From https://docs.min.io/enterprise/aistor-object-store/installation/kubernetes/load-balancing/
    #nginx.ingress.kubernetes.io/proxy-body-size: 130m
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/ignore-invalid-headers: "false"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    haproxy.org/max-body-size: "0"
    haproxy.org/h1-accept-invalid-headers: "true"
    haproxy.org/ssl-redirect: "true"
    haproxy.org/ssl-passthrough: "true"
    {{- with .Values.ingressConsole.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:
  ingressClassName: {{ .Values.ingressConsole.ingressClassName }}
  rules:
    - host: {{ .Values.baseName }}-console.{{ .Values.ingressConsole.domain }}
      http:
        paths:
          - backend:
              service:
                name: {{ .Values.baseName }}-console
                port:
                  number: 9443
            path: /
            pathType: Prefix

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.baseName }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
    - {{ .Values.baseName }}.{{ .Release.Namespace }}.svc.cluster.local
    - {{ .Values.baseName }}.{{ .Release.Namespace }}.svc
    - {{ .Values.baseName }}-hl.{{ .Release.Namespace }}.svc.cluster.local
    - "*.{{ .Values.baseName }}-hl.{{ .Release.Namespace }}.svc.cluster.local"
    - {{ .Values.baseName }}-hl.{{ .Release.Namespace }}.svc
    - "*.{{ .Values.baseName }}-hl.{{ .Release.Namespace }}.svc"
    - {{ .Values.baseName }}-console.{{ .Release.Namespace }}.svc.cluster.local
    - {{ .Values.baseName }}-console.{{ .Release.Namespace }}.svc
    - {{ .Values.baseName }}-console.{{ .Values.ingress.domain }}
    - {{ .Values.baseName }}.{{ .Values.ingress.domain }}
    - localhost
    - 127.0.0.1
  secretName: {{ .Values.baseName }}-tls
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.clusterIssuer }}

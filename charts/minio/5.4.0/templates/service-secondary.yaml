

# This is the service used by secondary ingress.
# This is required, as HAProxy can't use the same service for several ingresses

{{ if .Values.minio.secondaryIngress.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-secondary
  namespace: {{ .Release.Namespace  }}
  labels:
    app: minio-ingress-secondary
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 9000
      protocol: TCP
      targetPort: 9000
  selector:
    app: minio
    release: minio
{{ end }}
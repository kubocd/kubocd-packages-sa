
kyverno:
  resourcesName: minio*

minio:

  image:
    repository: quay.io/minio/minio
    tag: RELEASE.2025-04-03T14-56-28Z   # latest on 2025-04-08

  rootUser: # TBD
  rootPassword: # TBD

#  nameOverride: "minio"
#  fullnameOverride: "minio"

  additionalAnnotations:
    reloader.stakater.com/auto: "true"


  clusterIssuer: # TBD

  ## TLS Settings for MinIO
  tls:
    enabled: true
    ## Create a secret with private.key and public.crt files and pass that here. Ref: https://github.com/minio/minio/tree/master/docs/tls/kubernetes#2-create-kubernetes-secret
    certSecret: # TBD  "minio-internal-tls"
    publicCrt: tls.crt
    privateKey: tls.key

  persistence:
    storageClass: # TBD
    size: # TBD

  # Number of drives attached to a node
  drivesPerNode: # TBD ( 1 or Xx4)
  # Number of MinIO containers running
  replicas: # TBD (1 or Xx4)
  # Number of expanded MinIO clusters
  pools: # TBD (1 or more)

  resources:
    requests:
      memory: # TBD (min 4Gi ?)

  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: 130m   # As minio put uses chunk of 128MB
      haproxy.org/max-body-size: "0"
      #haproxy.org/h1-accept-invalid-headers: "true"
      haproxy.org/ssl-passthrough: "true"
    hosts:
      - # TBD

  consoleIngress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: 130m  # As minio put uses chunk of 128MB
      haproxy.org/max-body-size: "0"
      #haproxy.org/h1-accept-invalid-headers: "true"
      haproxy.org/ssl-redirect: "true"
      haproxy.org/ssl-passthrough: "true"
    hosts:
      - # TBD
    tls:
    # - secretName: minio-console-tls
    #   hosts:
    #     - TBD

  # This is ingress controller to access minio under another (public) CA
  # (The primary one use the minio internal CA which may be not referenced in client system).
  # Drawback of using this ingress is lost of performance.
  secondaryIngress:
    enabled: false
    clusterIssuer: # TBD
    ingressClassName: "nginx"
    host: # TBD
    secretName: # TBD
    annotations:

  # This is an ingress to access minio in plain text (No encryption).
  # Use this only for testing purpose. NEVER IN PRODUCTION
  clearTextIngress:
    enabled: false
    ingressClassName: "nginx"
    host: # TBD
    annotations:

  # This will provide a straight through access to minio, without ingress
  vip:
    enabled: false
    ip: # TBD
    host: # TBD To be included in the certificate

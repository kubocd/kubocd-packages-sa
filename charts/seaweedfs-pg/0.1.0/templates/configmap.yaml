apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "seaweed.baseName" . }}-filer-config
  namespace: {{ .Release.Namespace }}
data:
  filer.toml: |
    [leveldb2]
    enabled = false
    [postgres]
    enabled = true
    hostname = "{{ include "seaweed.baseName" . }}-db-rw.{{ .Release.Namespace }}.svc"
    port = 5432
    sslmode = "disable"



apiVersion: v1alpha1
name: argocd
tag: 9.1.6-p01
protected: false
schema:
  context:
    properties:
      ingress:
        required: true
        properties:
          className: { type: string, default: "nginx"}
          domain: { type: string, required: true }
      certificateIssuer:
        required: true
        properties:
          public: { type: string, required: true }
modules:
  - name: noname
    source:
      git:
        url: https://github.com/argoproj/argo-helm
        tag: argo-cd-9.1.6
        path: /charts/argo-cd
    values: |
      server:
        ingress:
          enabled: true
          tls: true
          annotations:
            cert-manager.io/cluster-issuer: {{ .Context.certificateIssuer.public }}
            {{- if eq .Context.ingress.className  "nginx" }}
            nginx.ingress.kubernetes.io/ssl-passthrough: "true"
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
            {{- end }}
            {{- if eq .Context.ingress.className  "haproxy" }}
            haproxy.org/ssl-passthrough: "true"
            haproxy.org/ssl-redirect: "true"
            {{- end }}
          ingressClassName: {{ .Context.ingress.className }}
          hostname: argocd.{{.Context.ingress.domain}}

dependencies:
  - ingress

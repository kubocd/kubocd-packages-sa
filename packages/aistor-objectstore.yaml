
apiVersion: v1alpha1
name: aistor-objectstore
tag: 1.0.9-p01
protected: false
schema:
  parameters:
    properties:
      baseName: { type: string, required: false }
      rootUser: { type: string, required: true }
      rootPassword: { type: string, required: true }
      logLevel: { type: string, default: "INFO" }
      deployInControlPlane: { type: boolean, default: false }
      deployInServicePlane: { type: boolean, default: false }
      storageSize: { type: string, default: "20Gi" }
      kubauth:
        properties:
          enabled: { type: boolean, default: false }
          privateClient: { type: boolean, default: true }
          displayName: { type: string, default: "Minio" }

  context:
    properties:
      certificateIssuer:
        required: true
        properties:
          public: { type: string, required: true }
      storageClass:
        required: true
        properties:
          data: { type: string, required: true }
      ingress:
        required: true
        properties:
          domain: { type: string, required: true }
          className: { type: string, default: "nginx"}
      oidc:
        properties:
          issuerURL: { type: string, required: true }
      issuerCaSecret:
        required: true
        properties:
          name: { type: string, required: true }
          type: { type: string }

templateHeader: |
  {{ $baseName := .Parameters.baseName | default .Release.metadata.name }}
  {{ $secretName := printf "aistor-oidc-%s" $baseName }}
  {{ $clientId := printf "%s-%s" .Release.spec.targetNamespace $baseName }}


modules:
  - name: helper
    source:
      local:
        path: ../charts/aistor-objectstore-helper/0.2.0
    values: |
      baseName: "{{ $baseName }}"
      clusterIssuer: "{{ .Context.certificateIssuer.public }}"
      ingress:
        domain: "{{ .Context.ingress.domain }}"
        ingressClassName: {{ .Context.ingress.className }}
        annotations:
          kindex.kubotal.io/link: "AIStor S3 API:bucket1:To use with 'mc' command"
      ingressConsole:
        domain: "{{ .Context.ingress.domain }}"
        ingressClassName: {{ .Context.ingress.className }}
        annotations:
          kindex.kubotal.io/link: "::AIStor console"
      oidcClient:
        enabled: {{ .Parameters.kubauth.enabled }}
        displayName: "{{ .Parameters.kubauth.displayName }}"
        secretName: {{ $secretName }}
        privateClient: {{ .Parameters.kubauth.privateClient }}
        clientId: {{ $clientId }}

  - name: noname
    dependsOn:
      - helper
    source:
      helmRepository:
        url:  https://helm.min.io/
        chart: aistor-objectstore
        version: 1.0.9
    values: |
      secrets:
        name: "{{ $baseName }}-env-configuration"
        accessKey: {{ .Parameters.rootUser }}
        secretKey: {{ .Parameters.rootPassword }}

      objectStore:
        name: "{{ $baseName }}"
        configuration:
          name: "{{ $baseName }}-env-configuration"
        pools:
          - name: pool-0
            servers: 1
            volumesPerServer: 4
            # The capacity per volume requested per MinIO Pod.
            size: "{{ .Parameters.storageSize }}"
            storageClassName: "{{ .Context.storageClass.data }}"
            {{ if .Parameters.deployInControlPlane }}
            tolerations:
              - key: "node-role.kubernetes.io/control-plane"
                operator: "Exists"
                effect: "NoSchedule"
            nodeSelector:
              node-role.kubernetes.io/control-plane: ""
            {{ end }}
            {{- if .Parameters.deployInServicePlane }}
            tolerations:
              - key: services.node-role.kubernetes.io
                operator: "Equal"
                effect: NoSchedule
                value: services
            nodeSelector:
              services.node-role.kubernetes.io: "services"
            {{- end }}
        services:
          console:
            name:  "{{ $baseName }}-console"
            serviceType: ClusterIP
          minio:
            name:  "{{ $baseName }}"
            serviceType: ClusterIP
        certificates:
          server:
            - name:  "{{ $baseName }}-tls"
              type: kubernetes.io/tls
          disableAutoCert: true
          trustedCAs:
            - name: "{{ .Context.issuerCaSecret.name }}"
              type: "{{ .Context.issuerCaSecret.type }}"
        env:
          {{- if .Parameters.kubauth.enabled }}
          - name: MINIO_IDENTITY_OPENID_CONFIG_URL_KUBAUTH
            value: "https://kubauth.{{ .Context.ingress.domain }}/.well-known/openid-configuration"
          - name: MINIO_IDENTITY_OPENID_CLIENT_ID_KUBAUTH
            value: "{{ $clientId }}"
          {{- if .Parameters.kubauth.privateClient }}
          - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET_KUBAUTH
            valueFrom:
              secretKeyRef:
                key: clientSecret
                name: {{ $secretName }}
          {{- end }}
          - name: MINIO_IDENTITY_OPENID_CLAIM_NAME_KUBAUTH
            value: "aistor_policies"
          - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME_KUBAUTH
            value: "KUBAUTH"
          - name: MINIO_IDENTITY_OPENID_CLAIM_USERINFO_KUBAUTH
            value: "off"
          - name: MINIO_IDENTITY_OPENID_REDIRECT_URI_KUBAUTH
            value: "https://{{ $baseName }}-console.{{ .Context.ingress.domain }}/oauth_callback"
          - name: MINIO_IDENTITY_OPENID_SCOPES_KUBAUTH
            value: "openid,groups,profile,email"
          {{- end }}
          - name: MINIO_LOG_LEVEL
            value: "{{ .Parameters.logLevel }}"

dependencies: |
  - aistorOperator
  - ingress
  - cert-manager
  {{ if .Parameters.kubauth.enabled }}
  - kubauth
  {{- if .Parameters.kubauth.privateClient }}
  - secretGenerator
  {{ end }}
  {{ end }}

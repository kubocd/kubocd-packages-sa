
apiVersion: v1alpha1
name: kubauth-users
tag: 0.2.0-p01
schema:
  parameters:
    properties:
      users:
        items:
          properties:
            login: { type: string, required: true }
            name: { type: string, required: false }
            emails: { items: { type: string, pattern: "^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$" } }
            passwordHash: { type: string }
            uid: { type: integer }
            comment: { type: string }
            claims: { type: object, additionalProperties: true, properties: {} }
            disabled: { type: boolean }
      groupBindings:
        items:
          properties:
            user: { type: string, required: true }
            group: { type: string, required: true }
      groups:
        items:
          properties:
            name: { type: string, required: true }
            comment: { type: string }
            claims: { type: object, additionalProperties: true, properties: {} }
      roleBindings:
        items:
          properties:
            name: { type: string, required: true }
            role: { type: string }
            clusterRole: { type: string }
            namespace: { type: string, required: true }
            users: { items: { type: string } }
            groups: { items: { type: string } }
      clusterRoleBindings:
        items:
          properties:
            name: { type: string, required: true }
            clusterRole: { type: string }
            users: { items: { type: string } }
            groups: { items: { type: string } }

modules:
  - name: noname
    source:
      oci:
        repository: quay.io/kubauth/charts/kubauth-users
        tag: 0.2.0-snapshot
    values: |
      {{- with .Parameters.users }}
      users:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Parameters.groupBindings }}
      groupBindings:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Parameters.groups }}
      groups:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Parameters.roleBindings }}
      roleBindings:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Parameters.clusterRoleBindings }}
      clusterRoleBindings:
        {{- toYaml . | nindent 6 }}
      {{- end }}

dependencies:
  - kubauth
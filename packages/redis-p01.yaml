

apiVersion: v1alpha1
name: redis
tag: 24.0.0-p01
description: Redis and a front UI
usage:
  text: |
    Redis UI can be accessed using {{if .Parameters.ui.tls}}https{{else}}http{{end}}://{{ .Parameters.ui.host }}.{{.Context.ingress.domain}}
schema:
  parameters:
    description: Redis stack
    properties:
      redis:
        required: false
        properties:
          password: { type: string, default: redis123 }
          replicaCount: { type: integer, default: 1, description: "The number of replicas"}
      ui:
        required: true
        properties:
          enabled: { type: boolean, default: true }
          tls: { type: boolean, default: false }
          host: { type: string, required: false }
  context:
    properties:
      ingress:
        required: true
        properties:
          className: { type: string, default: "nginx"}
          clusterIssuer: { type: string }
          domain: { type: string, required: true }
modules:
  - name: noname
    source:
      oci:
        repository: registry-1.docker.io/bitnamicharts/redis
        tag: 24.0.0
    values: |
      #fullnameOverride: {{ .Release.metadata.name }}
      global:
        redis:
          password: {{ .Parameters.redis.password }}
        security:
          allowInsecureImages: true
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false
        replicaCount: {{ .Parameters.redis.replicaCount }}
      image:
        tag: latest
  - name: ui
    enabled: "{{ .Parameters.ui.enabled }}"
    source:
      git:
        url: https://github.com/joeferner/redis-commander.git
        path: ././k8s/helm-chart/redis-commander
        branch: master
    values: |
      fullnameOverride: {{ .Release.metadata.name }}-ui
      redis:
        # host is <fullnameOverride>-<moduleName>-master
        host: {{ printf "%s-master" .Release.metadata.name }}
        password: {{ .Parameters.redis.password }}
      ingress:
        enabled: true
        className: {{ .Context.ingress.className }}
        {{- if .Parameters.ui.tls }}
        annotations:
          cert-manager.io/cluster-issuer: {{ required ".Context.certificateIssuer.public must be defined if tls: true" .Context.certificateIssuer.public }}
        {{- end }}
        hosts:
          - host: {{ .Parameters.ui.host }}.{{.Context.ingress.domain}}
            paths:
              - "/"
        {{- if .Parameters.ui.tls }}
        tls:
          - secretName: {{ .Release.metadata.name }}-tls
            hosts:
              - {{ .Parameters.ui.host }}.{{.Context.ingress.domain}}
        {{- end }}
    dependsOn:
      - noname
roles: |
  - redis
  {{ if .Parameters.ui.enabled }}
  - redis-ui
  {{ end }}
dependencies: |
  {{ if .Parameters.ui.enabled }}
  - ingress
  {{ if .Parameters.ui.tls }}
  - certManager
  {{ end }}
  {{ end }}

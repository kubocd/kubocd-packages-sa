

apiVersion: v1alpha1
name: weboidc
tag: 0.1.0-p02
schema:
  parameters:
    properties:
      name: { type: string, default: WEBOIDC }
      logger:
        properties:
          mode: { type: string, default: dev, enum: [ "dev", "json"] }
          level: { type: string, default: info, enum: [ "error", "info", "debug", "trace"] }
      host: { type: string, required: true }
      tls: { type: boolean, default: true }   # Must be set if kubauth is enabled, as currently, kubauth does not allow http:// on redirect URL (except for localhost)
      kubauth:
        properties:
          enabled: { type: boolean, default: true }
  context:
    properties:
      ingress:
        required: true
        properties:
          className: { type: string, default: "nginx"}
          domain: { type: string, required: true }
      oidc:
        required: false
        properties:
          issuerURL: { type: string, required: true }
      certificateIssuer:
        required: false
        properties:
          public: { type: string, required: true }
      networkPolicies: { type: boolean, required: true }
      issuerCaSecret:
        required: false   # True if oidc
        properties:
          name: { type: string, required: true }
          key: { type: string }

# Create a unique instance ID
templateHeader: |
  {{ $instanceId := printf "%s-%s" .Release.metadata.namespace .Release.metadata.name }}
  {{ $secretName := printf "weboidc-%s" $instanceId }}

modules:

  - name: noname
    source:
      oci:
        repository: quay.io/kuboauth/charts/weboidc
        tag: 0.1.0-snapshot
    timeout: 1m
    dependsOn:
      - oidc-client
    values: |
      name: {{ .Parameters.name }}
      log:
        mode: {{ .Parameters.logger.mode }}
        level: {{ .Parameters.logger.level  }}
      ingress:
        enabled: true
        class: {{ .Context.ingress.className }}
        host: {{ .Parameters.host }}.{{.Context.ingress.domain}}
        networkPolicy:
          enabled: {{ .Context.networkPolicies }}
      server:
        tls: {{ .Parameters.tls }}
        certificateIssuer: {{ dig "certificateIssuer" "public" "" .Context }}
      {{- if .Parameters.kubauth.enabled }}
      oidc:
        clientId:
          value: {{ printf "%s-%s" .Release.spec.targetNamespace $instanceId }}
        clientSecret:
          secret:
            name: {{ $secretName }}
            key: clientSecret
        issuerUrl: {{ .Context.oidc.issuerURL }}
        scopes: [ "openid", "offline", "profile", "groups", "email"]
        ca:
          secret:
            name: {{ .Context.issuerCaSecret.name }}
            key: {{ .Context.issuerCaSecret.key }}
      {{- end }}

  - name: oidc-client
    enabled: "{{ .Parameters.kubauth.enabled }}"
    source:
      local:
        path: ../charts/wrapper/1.0.0
    values:
      body: |
        ---
        apiVersion: kubauth.kubotal.io/v1alpha1
        kind: OidcClient
        metadata:
          name: {{ $instanceId }}
        spec:
          accessTokenLifespan: 1h0m0s
          description: A first test OIDC client application
          displayName: {{ .Parameters.name }}
          entryURL: https://{{ .Parameters.host }}.{{.Context.ingress.domain }}
          grantTypes: [ "refresh_token", "authorization_code" ]
          idTokenLifespan: 1h0m0s
          public: false
          redirectURIs:
            - {{ if .Parameters.tls }}https{{ else }}http{{ end}}://{{ .Parameters.host }}.{{.Context.ingress.domain }}/wo_callback
          refreshTokenLifespan: 1h0m0s
          responseTypes: ["id_token", "code", "token", "id_token token", "code id_token", "code token", "code id_token token"]
          scopes: [ "openid", "offline", "profile", "groups", "email"]
          secrets:
            - name:  {{ $secretName }}
              key: clientSecret

        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ $secretName }}
          annotations:
            secret-generator.v1.mittwald.de/autogenerate: clientSecret        
        type: Opaque


dependencies: |
  - ingress
  {{- if .Parameters.kubauth.enabled }}
  - kubauth
  - secretGenerator
  {{- end }}
  {{- if .Parameters.tls }}
  - certManager
  {{- end }}


apiVersion: v1alpha1
name: minio
tag: 5.4.0-p04
protected: true
schema:
  parameters:
    properties:
      deployInControlPlane: { type: boolean, default: false }
      deployInServicePlane: { type: boolean, default: false }
      rootUser: { type: string, required: true }
      rootPassword: { type: string, required: true }
      issuer: { type: string, default: "internal", enum: [ "internal", "public" ]}
      storage:
        required: true
        properties:
          # The regex is double escaped in JSON (\\d, \\.) because JSON strings treat backslashes as escape characters.
          driveSize: { type: string, required: true, pattern: "^([+-]?[0-9.]+)([eEinumkKMGTP]*[-+]?[0-9]*)$" }
          #driveSize: { type: string, required: true, pattern: '^\d+(?:\.\d+)?(Ki|Mi|Gi|Ti|Pi|Ei|KB|MB|GB|TB|PB|EB)$' }
          drivesPerNode: { type: integer, enum: [ 1, 4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56 ], default: 1 }
          replicas: { type: integer, enum: [ 1, 4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56 ], default: 1 }
          pools: { type: integer, default: 1 }
      ingresses:
        properties:
          passThrough:
            properties:
              enabled: { type: boolean, default: true }
              host: { type: string }
          console:
            properties:
              enabled: { type: boolean, default: true }
              host: { type: string }
          public:
            properties:
              enabled: { type: boolean, default: false }
              host: { type: string }
          clearText:
            properties:
              enabled: { type: boolean, default: false }
              host: { type: string }
      vip:
        properties:
          enabled: { type: boolean, default: false }
          host: { type: string, required: true }
      kubauth:
        properties:
          enabled: { type: boolean, default: true }
          privateClient: { type: boolean, default: true }
          displayName: { type: string, default: "Minio" }
  context:
    properties:
      certificateIssuer:
        required: true
        properties:
          internal: { type: string, required: true }
      storageClass:
        required: true
        properties:
          data: { type: string, required: true }
      ingress:
        required: true
        properties:
          domain: { type: string, required: true }
      oidc:
        properties:
          issuerURL: { type: string, required: true }


templateHeader: |
  {{ $instanceId := printf "%s-%s" .Release.metadata.namespace .Release.metadata.name }}
  {{ $oidcClientName := $instanceId }}
  {{ $clientId := printf "%s-%s" .Release.spec.targetNamespace $oidcClientName }}
  {{ $secretName := printf "minio-%s" $instanceId }}
  {{ $hostConsole := .Parameters.ingresses.console.host | default (printf "%s-console" .Release.metadata.name) }}


modules:
  - name: noname
    source:
      local:
        path: ../charts/minio/5.4.0
    dependsOn: |
      {{- if .Parameters.kubauth.enabled }}
      - oidc-client
      {{ end }}
    values: |
      minio:
        rootUser: {{ .Parameters.rootUser }} 
        rootPassword: {{ .Parameters.rootPassword }} 
        clusterIssuer: {{ dig "certificateIssuer" .Parameters.issuer "internal" .Context }}
        tls:
          enabled: true
          certSecret: {{ .Release.metadata.name }}-internal-tls 
        persistence:
          storageClass: {{ .Context.storageClass.data }}
          size: {{ .Parameters.storage.driveSize }}
        drivesPerNode: {{ .Parameters.storage.drivesPerNode }}
        replicas: {{ .Parameters.storage.replicas }}
        pools: {{ .Parameters.storage.pools }}
        mode: {{ if ne .Parameters.storage.replicas 1.0 }}distributed{{else}}standalone{{end}}
        {{- if .Parameters.deployInControlPlane }}
        tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        {{- end }}
        {{- if .Parameters.deployInServicePlane }}
        tolerations:
          - key: services.node-role.kubernetes.io
            operator: "Equal"
            effect: NoSchedule
            value: services
        nodeSelector:
          services.node-role.kubernetes.io: "services"
        {{- end }}
        ingress:
          enabled: {{ .Parameters.ingresses.passThrough.enabled }}
          ingressClassName: {{ .Context.ingress.className }}
          annotations:
            kindex.kubotal.io/link: "Minio S3 API:bucket1:To use with 'mc' command"
          hosts:
            - {{ .Parameters.ingresses.passThrough.host | default (printf "%s" .Release.metadata.name) }}.{{ .Context.ingress.domain }}
        consoleIngress:
          enabled: {{ .Parameters.ingresses.console.enabled }}
          ingressClassName: {{ .Context.ingress.className }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Context.certificateIssuer.public }}
            kindex.kubotal.io/link: "::Minio console"
          hosts:
            - {{ $hostConsole }}.{{ .Context.ingress.domain }}
          tls:
            - secretName: {{ .Release.metadata.name }}-console-tls 
              hosts:
                - {{ $hostConsole }}.{{ .Context.ingress.domain }}
        secondaryIngress:
          enabled: {{ .Parameters.ingresses.public.enabled }}
          ingressClassName: {{ .Context.ingress.className }}
          clusterIssuer: {{ .Context.certificateIssuer.public }}
          host: {{ .Parameters.ingresses.public.host | default (printf "%s-public" .Release.metadata.name) }}.{{ .Context.ingress.domain }}
          annotations:
            kindex.kubotal.io/link: "Minio S3 API:bucket1:Secondary ingress"
        clearTextIngress:
          enabled: {{ .Parameters.ingresses.clearText.enabled }}
          ingressClassName: {{ .Context.ingress.className }}
          host: {{ .Parameters.ingresses.clearText.host | default (printf "%s-clear-text" .Release.metadata.name) }}.{{ .Context.ingress.domain }}
          annotations:
            kindex.kubotal.io/link: "Minio S3 API:bucket1:Clear text ingress (UNSAFE)"
        {{- if .Parameters.vip.enabled }}
        vip:
          enabled: true
          host: {{ .Parameters.vip.host }}
          ip: {{ resolveDNS .Parameters.vip.host }}
        {{- end }}
        users: []
        {{- if .Parameters.kubauth.enabled }}
        oidc:
          enabled: true
          configUrl: {{ .Context.oidc.issuerURL }}/.well-known/openid-configuration
          clientId: {{ $clientId }}
          {{- if .Parameters.kubauth.privateClient }}
          existingClientSecretName: {{ $secretName }}
          existingClientSecretKey: clientSecret
          {{- end }}
          claimName: policy
          scope:  "openid,profile,email"
          redirectUri: https://{{ $hostConsole }}.{{ .Context.ingress.domain }}/oauth_callback
          displayName: KUBAUTH
        {{- end }}


  - name: oidc-client
    enabled: "{{ .Parameters.kubauth.enabled }}"
    source:
      local:
        path: ../charts/wrapper/1.0.0
    values:
      body: |
        ---
        apiVersion: kubauth.kubotal.io/v1alpha1
        kind: OidcClient
        metadata:
          name: {{ $oidcClientName }}
        spec:
          clientId: {{ $clientId }}   # Otherwise, client_id will be wrong if deployed on 'kubauth' namespace
          redirectURIs:
            - "https://{{ $hostConsole }}.{{ .Context.ingress.domain }}/oauth_callback"
          grantTypes: [ "refresh_token", "authorization_code" ]
          responseTypes: ["id_token", "code", "token", "id_token token", "code id_token", "code token", "code id_token token"]
          scopes: [ "openid", "offline", "profile", "groups", "email", "offline_access", "address", "phone"]
          displayName: {{ .Parameters.kubauth.displayName }}
          description: S3 Server
          entryURL: "https://{{ $hostConsole }}.{{ .Context.ingress.domain }}"
          {{ if .Parameters.kubauth.privateClient }}
          public: false
          secrets:
            - name:  {{ $secretName }}
              key: clientSecret
          {{ else }}
          public: true
          {{ end }}
        
        {{- if .Parameters.kubauth.privateClient }}
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ $secretName }}
          annotations:
            secret-generator.v1.mittwald.de/autogenerate: clientSecret        
        type: Opaque
        {{- end }}


dependencies: |
  - storage
  - ingress
  - certManager
  {{- if .Parameters.kubauth.enabled }}
  - kubauth
  {{- if .Parameters.kubauth.privateClient }}
  - secretGenerator
  {{ end }}
  {{ end }}

roles:
  - objectStore
  - "{{.Release.metadata.namespace}}-objectStore"

